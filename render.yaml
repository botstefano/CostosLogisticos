services:
  # Backend API
  - type: web
    name: logistic-cost-system-backend
    plan: free
    env: docker
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: DEFAULT_ALERT_THRESHOLD
        value: 10

  # Frontend
  - type: web
    name: logistic-cost-system-frontend
    plan: free
    env: docker
    region: oregon
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        sync: false
