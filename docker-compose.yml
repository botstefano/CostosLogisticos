version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: logistic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistic_cost_system
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: logistic_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: logistic_cost_system
      JWT_SECRET: cambia_este_secreto_por_uno_seguro
      JWT_EXPIRES_IN: 8h
      DEFAULT_ALERT_THRESHOLD: 10
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/backups:/app/backups
    command: sh -c "until pg_isready -h db -p 5432 -U postgres; do sleep 1; done && node src/database/seed.js && node src/server.js"

  frontend:
    build: ./frontend
    container_name: logistic_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
